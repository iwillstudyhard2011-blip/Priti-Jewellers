<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Priti Jewellers</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: #fffaf7;
}

/* HEADER */
header {
    background: #6b0000;
    color: white;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    display: flex;
    align-items: center;
}

.logo img {
    height: 50px;
    margin-right: 10px;
}

nav a {
    color: white;
    margin-left: 15px;
    text-decoration: none;
    font-weight: 500;
}

.insta-btn { background:#ff4d6d; padding:8px 12px; border-radius:5px; }
.map-btn { background:#007bff; padding:8px 12px; border-radius:5px; }

/* SLIDESHOW */
.slideshow {
    position: relative;
    height: 80vh;
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: 1s;
}

.slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.active { opacity: 1; }

.hero-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    background: rgba(0,0,0,0.6);
    padding: 20px;
    font-size: 40px;
}

/* PRODUCTS */
.products {
    padding: 60px 30px;
    text-align: center;
}

.products h2 {
    margin-bottom: 30px;
    font-size: 32px;
}

.product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 25px;
}

.product {
    background: white;
    padding: 20px;
    border-radius: 12px;
    transition: 0.3s;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.product:hover {
    transform: translateY(-5px);
}

.product img {
    width: 100%;
    border-radius: 10px;
}

.product h3 {
    margin: 10px 0;
}

.product p {
    font-weight: bold;
}

/* BUTTON */
button {
    background: #25D366;
    color: white;
    border: none;
    padding: 10px 18px;
    margin-top: 10px;
    border-radius: 5px;
    cursor: pointer;
}

/* FOOTER */
footer {
    background: #6b0000;
    color: white;
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<header>
    <div class="logo">
        <img src="logo.jpg">
        <h1>Priti Jewellers</h1>
    </div>

    <nav>
        <a href="#">Home</a>
        <a href="#products">Shop</a>
        <a href="#contact">Contact</a>

        <a href="https://www.instagram.com/pritijewellers_/" target="_blank" class="insta-btn">Instagram</a>
        <a href="https://maps.app.goo.gl/J6nWHvYyZNvwuSk3A" target="_blank" class="map-btn">Location</a>
    </nav>
</header>

<!-- SLIDESHOW -->
<section class="slideshow">
    <div class="slide active">
        <img src="https://images.unsplash.com/photo-1515562141207-7a88fb7ce338">
    </div>
    <div class="slide">
        <img src="https://images.unsplash.com/photo-1600180758890-6b94519a8ba6">
    </div>
    <div class="slide">
        <img src="https://images.unsplash.com/photo-1585386959984-a4155224a1ad">
    </div>

    <div class="hero-text">Welcome to Priti Jewellers ✨</div>
</section>

<!-- PRODUCTS -->
<section class="products" id="products">
<h2>Our Collection</h2>

<div class="product-grid">

<div class="product">
<img src="https://images.unsplash.com/photo-1602752250015-52934bc45613">
<h3>Gold Necklace</h3>
<p>₹12,999</p>
<a href="https://wa.me/919422839306?text=I%20want%20to%20buy%20Gold%20Necklace" target="_blank">
<button>Order on WhatsApp</button>
</a>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1585386959984-a4155224a1ad">
<h3>Diamond Ring</h3>
<p>₹25,499</p>
<a href="https://wa.me/919422839306?text=I%20want%20to%20buy%20Diamond%20Ring" target="_blank">
<button>Order on WhatsApp</button>
</a>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1611652022419-a9419f74343d">
<h3>Silver Bracelet</h3>
<p>₹4,999</p>
<a href="https://wa.me/919422839306?text=I%20want%20to%20buy%20Silver%20Bracelet" target="_blank">
<button>Order on WhatsApp</button>
</a>
</div>

</div>
</section>

<section class="products" id="contact">
<h2>Contact Us</h2>
<p>Phone / WhatsApp: +91 94228 39306</p>
<p>Email: support@pritijewellers.com</p>
</section>

<footer>
<p>© 2026 Priti Jewellers</p>
</footer>

<!-- AUTO SLIDE -->
<script>
let slides = document.querySelectorAll(".slide");
let i = 0;

setInterval(() => {
    slides[i].classList.remove("active");
    i = (i + 1) % slides.length;
    slides[i].classList.add("active");
}, 3000);
</script>

</body>
</html>
