<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    background:#111;
    color:white;

}

/* HEADER */
header {
    background:black;
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo {
    display:flex;
    align-items:center;
}

.logo img {
    height:70px;
    margin-right:10px;
}

.logo h1 {
    font-family:'Playfair Display', serif;
    color:gold;
}

/* NAV */
nav a {
    color:white;
    margin-left:10px;
    text-decoration:none;
    padding:6px 10px;
}

.insta-btn { background:#ff4d6d; border-radius:5px; }
.map-btn { background:#007bff; border-radius:5px; }

/* SLIDESHOW */
.slideshow {
    position:relative;
    height:80vh;
}

.slide {
    position:absolute;
    width:100%;
    height:100%;
    opacity:0;
    transition:1s;
}

.slide img {
    width:100%;
    height:100%;
    object-fit:cover;
}

.active { opacity:1; }

.hero-text {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:40px;
    background:rgba(0,0,0,0.6);
    padding:20px;
}

/* PRODUCTS */
.products {
    padding:60px 30px;
    text-align:center;
}

.products h2 {
    color:gold;
    margin-bottom:30px;
    font-family:'Playfair Display', serif;
}

.product-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
}

.product {
    background:#1a1a1a;
    padding:20px;
    border-radius:15px;
    transition:0.3s;
    box-shadow:0 0 10px rgba(255,215,0,0.1);
}

.product:hover {
    transform:translateY(-10px);
    box-shadow:0 0 20px rgba(255,215,0,0.4);
}

.product img {
    width:100%;
    height:260px;
    object-fit:cover;
    border-radius:12px;
}

/* BUTTON */
button {
    background:linear-gradient(45deg,gold,orange);
    color:black;
    border:none;
    padding:10px 18px;
    margin-top:10px;
    border-radius:25px;
    cursor:pointer;
}

/* WHATSAPP BUTTON */
.whatsapp {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    font-size:22px;
    padding:15px 18px;
    border-radius:50%;
    text-decoration:none;
}

/* FOOTER */
footer {
    background:black;
    padding:20px;
    text-align:center;
}
</style>
</head>
