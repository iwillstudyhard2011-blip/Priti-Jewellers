<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Priti Jewellers</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    background:#111;
    color:white;
    font-family:'Poppins',sans-serif;
}

/* HEADER */
header {
    background:black;
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo {
    display:flex;
    align-items:center;
}

.logo img {
    height:70px;
    margin-right:10px;
}

.logo h1 {
    font-family:'Playfair Display', serif;
    color:gold;
}

/* NAV */
nav a {
    color:white;
    margin-left:10px;
    text-decoration:none;
    padding:6px 10px;
}

.insta-btn { background:#ff4d6d; border-radius:5px; }
.map-btn { background:#007bff; border-radius:5px; }

/* SLIDESHOW */
.slideshow {
    position:relative;
    height:80vh;
}

.slide {
    position:absolute;
    width:100%;
    height:100%;
    opacity:0;
    transition:1s;
}

.slide img {
    width:100%;
    height:100%;
    object-fit:cover;
}

.active { opacity:1; }

.hero-text {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:40px;
    background:rgba(0,0,0,0.6);
    padding:20px;
}

/* PRODUCTS */
.products {
    padding:60px 30px;
    text-align:center;
}

.products h2 {
    color:gold;
    margin-bottom:30px;
    font-family:'Playfair Display', serif;
}

.product-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
}

.product {
    background:#1a1a1a;
    padding:20px;
    border-radius:15px;
    transition:0.3s;
    box-shadow:0 0 10px rgba(255,215,0,0.1);
}

.product:hover {
    transform:translateY(-10px);
    box-shadow:0 0 20px rgba(255,215,0,0.4);
}

.product img {
    width:100%;
    height:260px;
    object-fit:cover;
    border-radius:12px;
}

/* BUTTON */
button {
    background:linear-gradient(45deg,gold,orange);
    color:black;
    border:none;
    padding:10px 18px;
    margin-top:10px;
    border-radius:25px;
    cursor:pointer;
}

/* FLOATING WHATSAPP */
.whatsapp {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    font-size:22px;
    padding:15px 18px;
    border-radius:50%;
    text-decoration:none;
    box-shadow:0 0 10px rgba(0,0,0,0.5);
}

/* FOOTER */
footer {
    background:black;
    padding:20px;
    text-align:center;
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="logo.jpg">
<h1>Priti Jewellers</h1>
</div>

<nav>
<a href="#">Home</a>
<a href="#products">Shop</a>
<a href="#contact">Contact</a>

<a href="https://www.instagram.com/pritijewellers_/" target="_blank" class="insta-btn">Instagram</a>
<a href="https://maps.app.goo.gl/J6nWHvYyZNvwuSk3A" target="_blank" class="map-btn">Location</a>
</nav>
</header>

<!-- SLIDESHOW -->
<section class="slideshow">
<div class="slide active"><img src="shop1.png"></div>
<div class="slide"><img src="shop2.png"></div>
<div class="slide"><img src="shop3.png"></div>

<div class="hero-text">Priti Jewellers ✨</div>
</section>

<!-- PRODUCTS -->
<section class="products" id="products">
<h2>Our Collection</h2>

<div class="product-grid">

<div class="product">
<img src="https://images.unsplash.com/photo-1602752250015-52934bc45613">
<h3>Gold Necklace</h3>
<a href="https://wa.me/919422839306?text=I%20want%20Gold%20Necklace" target="_blank">
<button>Order Now</button>
</a>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f">
<h3>Diamond Ring</h3>
<a href="https://wa.me/919422839306?text=I%20want%20Diamond%20Ring" target="_blank">
<button>Order Now</button>
</a>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1611652022419-a9419f74343d">
<h3>Bracelet</h3>
<a href="https://wa.me/919422839306?text=I%20want%20Bracelet" target="_blank">
<button>Order Now</button>
</a>
</div>

</div>
</section>

<section class="products" id="contact">
<h2>Contact</h2>
<p>WhatsApp: +91 94228 39306</p>
</section>

<footer>
<p>© 2026 Priti Jewellers</p>
</footer>

<!-- FLOATING WHATSAPP BUTTON -->
<a href="https://wa.me/919422839306" target="_blank" class="whatsapp">💬</a>

<script>
let slides=document.querySelectorAll(".slide");
let i=0;
setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},3000);
</script>

</body>
</html>
